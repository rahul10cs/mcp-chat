<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Salesforce AI Chat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .chat-container {
      width: 100%;
      max-width: 720px;
      height: 90vh;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-header {
      background: #0070d2;
      color: white;
      padding: 18px 24px;
      font-size: 17px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .chat-header .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #4ade80;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message {
      display: flex;
      flex-direction: column;
      max-width: 80%;
    }

    .message.user { align-self: flex-end; align-items: flex-end; }
    .message.bot  { align-self: flex-start; align-items: flex-start; }

    .bubble {
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
    }

    .message.user .bubble {
      background: #0070d2;
      color: white;
      border-bottom-right-radius: 4px;
    }

    .message.bot .bubble {
      background: #f3f4f6;
      color: #111;
      border-bottom-left-radius: 4px;
    }

    .label {
      font-size: 11px;
      color: #9ca3af;
      margin-bottom: 4px;
      padding: 0 4px;
    }

    .typing .bubble {
      background: #f3f4f6;
      color: #6b7280;
      font-style: italic;
    }

    .input-area {
      padding: 16px 20px;
      border-top: 1px solid #e5e7eb;
      display: flex;
      gap: 10px;
    }

    textarea {
      flex: 1;
      padding: 12px 14px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      font-size: 14px;
      resize: none;
      height: 48px;
      font-family: inherit;
      outline: none;
      transition: border 0.2s;
    }

    textarea:focus { border-color: #0070d2; }

    button {
      padding: 0 20px;
      background: #0070d2;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      height: 48px;
    }

    button:hover   { background: #005fb2; }
    button:disabled { background: #93c5fd; cursor: not-allowed; }

    .suggestions {
      padding: 0 24px 16px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .suggestion {
      background: #eff6ff;
      color: #0070d2;
      border: 1px solid #bfdbfe;
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .suggestion:hover { background: #dbeafe; }
  </style>
</head>
<body>

<div class="chat-container">

  <div class="chat-header">
    <div class="dot"></div>
    Salesforce AI Assistant
  </div>

  <div class="messages" id="messages">
    <div class="message bot">
      <div class="label">Assistant</div>
      <div class="bubble">Hi! I'm connected to your Salesforce org. Ask me anything about your accounts, contacts, opportunities, or cases.</div>
    </div>
  </div>

  <div class="suggestions">
    <span class="suggestion" onclick="fillInput(this)">Show me top 10 accounts</span>
    <span class="suggestion" onclick="fillInput(this)">List Closed Won opportunities</span>
    <span class="suggestion" onclick="fillInput(this)">Find open cases</span>
    <span class="suggestion" onclick="fillInput(this)">What org am I connected to?</span>
  </div>

  <div class="input-area">
    <textarea id="input" placeholder="Ask about your Salesforce data..." onkeydown="handleKey(event)"></textarea>
    <button id="sendBtn" onclick="sendMessage()">Send</button>
  </div>

</div>

<script>
  const messagesEl = document.getElementById("messages");
  const inputEl    = document.getElementById("input");
  const sendBtn    = document.getElementById("sendBtn");

  function fillInput(el) {
    inputEl.value = el.textContent;
    inputEl.focus();
  }

  function handleKey(e) {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function addMessage(role, text) {
    const wrapper = document.createElement("div");
    wrapper.className = `message ${role}`;

    const label = document.createElement("div");
    label.className = "label";
    label.textContent = role === "user" ? "You" : "Assistant";

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.textContent = text;

    wrapper.appendChild(label);
    wrapper.appendChild(bubble);
    messagesEl.appendChild(wrapper);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return wrapper;
  }

  function addTyping() {
    const wrapper = document.createElement("div");
    wrapper.className = "message bot typing";
    wrapper.id = "typing";

    const label = document.createElement("div");
    label.className = "label";
    label.textContent = "Assistant";

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.textContent = "Thinking...";

    wrapper.appendChild(label);
    wrapper.appendChild(bubble);
    messagesEl.appendChild(wrapper);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function removeTyping() {
    const el = document.getElementById("typing");
    if (el) el.remove();
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;

    inputEl.value = "";
    sendBtn.disabled = true;

    addMessage("user", text);
    addTyping();

    try {
      const res = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: text }),
      });
      const data = await res.json();
      removeTyping();
      addMessage("bot", data.reply);
    } catch (err) {
      removeTyping();
      addMessage("bot", "Something went wrong. Please try again.");
    }

    sendBtn.disabled = false;
    inputEl.focus();
  }
</script>

</body>
</html>
